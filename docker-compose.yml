version: '3.8'

services:
  # 1. C++ zero-trust gateway
  gateway:
    build:
      context: ./gateway
      dockerfile: Dockerfile
    container_name: matchingdonors-waf
    ports:
      - "8080:8080"
    environment:
      - BACKEND_HOST=social-agent
    depends_on:
      - social-agent
    restart: unless-stopped

  # 2. Backend AI agent
  social-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: matchingdonors-agent
    expose:
      - "3001"
    env_file:
      - .env
    volumes:
      - ./data:/app/data
    restart: unless-stopped